name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # 只在 main 分支推送时部署

# 权限：允许写 Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages # 内置环境，不用自己配密钥
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/ # 你的打包目录

      - name: 部署到 Pages
        uses: actions/deploy-pages@v4
